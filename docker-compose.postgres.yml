services:
  postgres:
    image: postgres:16
    container_name: web_api_automation_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: web_api_automation_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d web_api_automation_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
